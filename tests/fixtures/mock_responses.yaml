# Mock model responses for sven end-to-end / bats tests.
#
# Rules are matched against the last user message (case-insensitive).
# The first matching rule wins; 'default' is the fallback.
#
# match_type: contains | equals | starts_with | regex | default
#
# Simple reply:
#   reply: "text"
#
# Tool-call sequence (the agent runs the tool, then calls the model again):
#   tool_calls:
#     - id: tc-1
#       tool: <tool-name>       # e.g. "run_terminal_command" | "write" | "read_file" | "glob_file_search"
#       args: { ... }           # YAML map → serialised to JSON for the tool
#   after_tool_reply: "text"    # response after tool results arrive

responses:

  # ── Sanity / basic ──────────────────────────────────────────────────────────

  - match_type: equals
    pattern: "ping"
    reply: "pong"

  - match_type: equals
    pattern: "hello"
    reply: "hello from sven mock agent"

  # ── Multi-word contains match ───────────────────────────────────────────────

  - match_type: contains
    pattern: "what is rust"
    reply: |
      Rust is a systems programming language focused on safety, speed, and concurrency.
      It achieves memory safety without a garbage collector through its ownership system.

  # ── Research mode ───────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "research"
    reply: |
      ## Research Summary

      Based on my analysis of the codebase:

      - The project is structured as a Rust workspace with 7 crates
      - Each crate has a clearly defined responsibility
      - Tests cover both unit and integration scenarios

  # ── Plan mode ───────────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "make a plan"
    reply: |
      ## Plan

      1. Analyse the existing codebase structure
      2. Identify gaps and missing features
      3. Implement changes incrementally
      4. Write tests for each change
      5. Review and finalise

  - match_type: starts_with
    pattern: "plan"
    reply: |
      ## Implementation Plan

      ### Phase 1 — Setup
      Configure the environment and dependencies.

      ### Phase 2 — Implementation
      Write the core logic following existing conventions.

      ### Phase 3 — Testing
      Add unit and integration tests.

  # ── Pipeline / summarise ────────────────────────────────────────────────────

  - match_type: starts_with
    pattern: "summarize"
    reply: "Summary: the previous agent output described a structured plan with multiple phases."

  - match_type: starts_with
    pattern: "summarise"
    reply: "Summary: the previous agent output described a structured plan with multiple phases."

  - match_type: starts_with
    pattern: "implement the plan"
    reply: "Implementation complete. All phases from the plan have been executed."

  - match_type: contains
    pattern: "implement"
    reply: "Implementation complete. The requested changes have been applied."

  # ── File operations (tool-call sequences) ───────────────────────────────────

  - match_type: contains
    pattern: "write a file"
    tool_calls:
      - id: tc-write
        tool: write_file
        args:
          path: /tmp/sven_e2e_test.txt
          text: "written by sven mock agent"
          append: false
    after_tool_reply: "I have written the content to /tmp/sven_e2e_test.txt"

  - match_type: contains
    pattern: "read the file"
    tool_calls:
      - id: tc-read
        tool: read_file
        args:
          path: /tmp/sven_e2e_test.txt
    after_tool_reply: "File read successfully. Contents match expectations."

  - match_type: contains
    pattern: "read nonexistent file"
    tool_calls:
      - id: tc-read-missing
        tool: read_file
        args:
          path: /tmp/sven_e2e_nonexistent_file_xyz.txt
    after_tool_reply: "I tried to read the file but it does not exist."

  - match_type: contains
    pattern: "list files"
    tool_calls:
      - id: tc-list
        tool: shell
        args:
          shell_command: "ls /tmp"
    after_tool_reply: "Listed /tmp directory. Found the expected files."

  # ── Shell execution ─────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "run echo"
    tool_calls:
      - id: tc-echo
        tool: shell
        args:
          shell_command: "echo sven_mock_shell_output"
    after_tool_reply: "Shell command executed. Output contained: sven_mock_shell_output"

  - match_type: contains
    pattern: "run ls"
    tool_calls:
      - id: tc-ls
        tool: shell
        args:
          shell_command: "ls /tmp"
    after_tool_reply: "Directory listing completed successfully."

  # ── Multi-step markdown sequences ───────────────────────────────────────────
  # (each H2 section in a markdown file is submitted as a separate user message)

  - match_type: contains
    pattern: "step one"
    reply: "Step 1 complete: environment analysed."

  - match_type: contains
    pattern: "step two"
    reply: "Step 2 complete: implementation applied."

  - match_type: contains
    pattern: "step three"
    reply: "Step 3 complete: tests passing."

  - match_type: contains
    pattern: "analyse the codebase"
    reply: "Codebase analysis complete. The project uses a Rust workspace with clear separation of concerns."

  - match_type: contains
    pattern: "summarise findings"
    reply: "Summary: the codebase is well-structured with comprehensive test coverage."

  # ── Mode-tagged replies ──────────────────────────────────────────────────────

  - match_type: starts_with
    pattern: "[research]"
    reply: "Research mode: gathering information only, no changes made."

  - match_type: starts_with
    pattern: "[plan]"
    reply: "Plan mode: structured plan generated."

  - match_type: starts_with
    pattern: "[agent]"
    reply: "Agent mode: task executed with full tool access."

  # ── Error simulation ─────────────────────────────────────────────────────────
  # (tests that verify error output goes to stderr)

  - match_type: equals
    pattern: "trigger error"
    reply: "This response was generated but the task had issues."

  # ── Glob / search ────────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "find rust files"
    tool_calls:
      - id: tc-glob
        tool: find_file
        args:
          pattern: "*.rs"
          root: /data/agents/sven/crates
          max_results: 5
    after_tool_reply: "Found Rust source files in the crates directory."

  # ── New tools (shell, read_file, edit_file, grep, apply_patch) ─

  - match_type: contains
    pattern: "run terminal command"
    tool_calls:
      - id: tc-rtc
        tool: shell
        args:
          shell_command: "echo sven_terminal_output"
    after_tool_reply: "Terminal command executed. Output: sven_terminal_output"

  - match_type: contains
    pattern: "read the test file"
    tool_calls:
      - id: tc-rf
        tool: read_file
        args:
          path: /tmp/sven_e2e_test.txt
    after_tool_reply: "File read with line numbers."

  - match_type: contains
    pattern: "edit the test file"
    tool_calls:
      - id: tc-ef
        tool: edit_file
        args:
          path: /tmp/sven_e2e_test.txt
          diff: "@@ -1 +1 @@\n-written by sven mock agent\n+edited by sven mock agent\n"
    after_tool_reply: "File edited successfully."

  - match_type: contains
    pattern: "grep for pattern"
    tool_calls:
      - id: tc-grep
        tool: grep
        args:
          pattern: "sven"
          path: /data/agents/sven/crates/sven-tools/src/lib.rs
          limit: 5
    after_tool_reply: "Grep completed. Found matching lines."

  - match_type: contains
    pattern: "search the codebase"
    tool_calls:
      - id: tc-sc
        tool: grep
        args:
          pattern: "ToolRegistry"
          path: /data/agents/sven/crates/sven-tools/src
          include: "*.rs"
          case_sensitive: true
          limit: 5
          output_mode: "content"
          context_lines: 0
    after_tool_reply: "Codebase search completed."

  - match_type: contains
    pattern: "write todo list"
    tool_calls:
      - id: tc-todo
        tool: todo
        args:
          action: "set"
          todos:
            - id: "1"
              content: "first task"
              status: "in_progress"
            - id: "2"
              content: "second task"
              status: "pending"
    after_tool_reply: "Todo list updated."

  - match_type: contains
    pattern: "list the directory"
    tool_calls:
      - id: tc-ld
        tool: shell
        args:
          shell_command: "ls /data/agents/sven/crates"
    after_tool_reply: "Directory listing complete."

  # ── Headless enhancements test patterns ─────────────────────────────────────

  - match_type: contains
    pattern: "variable test"
    reply: "Variable substitution confirmed: template variables are working."

  - match_type: contains
    pattern: "context file test"
    reply: "Context file instructions received and acknowledged."

  - match_type: contains
    pattern: "system prompt test"
    reply: "Custom system prompt acknowledged and applied."

  - match_type: contains
    pattern: "final response test"
    reply: "This is the final agent response for output-last-message test."

  - match_type: contains
    pattern: "frontmatter test"
    reply: "Frontmatter configuration applied and workflow executing."

  - match_type: contains
    pattern: "per-step test"
    reply: "Per-step option was applied to this step."

  # ── GDB tool mocks ───────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "start gdb server"
    tool_calls:
      - id: tc-gdb-start
        tool: gdb
        args:
          action: start_server
          server_command: "sleep 30"
    after_tool_reply: "GDB server started. (Note: mock server uses sleep as placeholder; use gdb_connect to attach.)"

  - match_type: contains
    pattern: "connect gdb"
    tool_calls:
      - id: tc-gdb-connect
        tool: gdb
        args:
          action: connect
          port: 19998
    after_tool_reply: "GDB connect attempted. Result depends on server availability."

  - match_type: contains
    pattern: "stop gdb"
    tool_calls:
      - id: tc-gdb-stop
        tool: gdb
        args:
          action: stop
    after_tool_reply: "GDB session stopped successfully."

  - match_type: contains
    pattern: "find elf"
    tool_calls:
      - id: tc-glob-elf
        tool: find_file
        args:
          pattern: "*.elf"
          root: /tmp
    after_tool_reply: "ELF file search completed."

  - match_type: contains
    pattern: "discover device"
    reply: |
      Device discovery results:
      - Found `debugging/launch.json` with servertype: jlink, device: AT32F435RMT7
      - GDB server command: JLinkGDBServer -device AT32F435RMT7 -if SWD -speed 4000 -port 2331
      - ELF path: build-firmware/ng-iot-platform/zephyr/zephyr.elf

  - match_type: contains
    pattern: "gdb session"
    reply: |
      GDB session summary:
      - Server started: JLinkGDBServer -device AT32F435RMT7
      - Connected: yes
      - ELF loaded: build-firmware/ng-iot-platform/zephyr/zephyr.elf
      - Registers captured: pc=0x08000000, sp=0x20080000
      - Session stopped cleanly.

  # ── Thinking / reasoning traces ──────────────────────────────────────────────
  # Used by tests that verify [sven:thinking] appears in CI stderr output.

  - match_type: contains
    pattern: "think deeply"
    thinking: |
      Let me carefully reason through this.
      First, I need to understand the request.
      Then I will formulate an answer.
    reply: "After careful reasoning, the answer is: forty-two."

  # ── Context tools ────────────────────────────────────────────────────────────

  - match_type: contains
    pattern: "open context file"
    tool_calls:
      - id: tc-ctx-open
        tool: context
        args:
          action: open
          path: /data/agents/sven/crates/sven-tools/src/builtin/context/store.rs
    after_tool_reply: "Context file opened successfully. I have a handle for store.rs."

  - match_type: contains
    pattern: "open context directory"
    tool_calls:
      - id: tc-ctx-open-dir
        tool: context
        args:
          action: open
          path: /data/agents/sven/crates/sven-tools/src/builtin/context
          include_pattern: "*.rs"
          recursive: false
    after_tool_reply: "Directory context opened. I have a handle for the context module source files."

  - match_type: contains
    pattern: "open context missing path"
    tool_calls:
      - id: tc-ctx-open-missing
        tool: context
        args:
          action: open
          path: /tmp/sven_no_such_context_path_xyz_99
    after_tool_reply: "Attempted to open a missing path. The tool reported an error as expected."

  - match_type: contains
    pattern: "grep context bad handle"
    tool_calls:
      - id: tc-ctx-grep-bad
        tool: context
        args:
          action: grep
          handle: ctx_bad_handle_test_xyz
          pattern: "pub fn"
    after_tool_reply: "Attempted grep with an invalid context handle. Error handled gracefully."

  - match_type: contains
    pattern: "read context bad handle"
    tool_calls:
      - id: tc-ctx-read-bad
        tool: context
        args:
          action: read
          handle: ctx_bad_handle_test_xyz
          start_line: 1
          end_line: 10
    after_tool_reply: "Attempted read with an invalid context handle. Error handled gracefully."

  - match_type: contains
    pattern: "query context bad handle"
    tool_calls:
      - id: tc-ctx-query-bad
        tool: context
        args:
          action: query
          handle: ctx_bad_handle_test_xyz
          prompt: "Summarise this content: {chunk}"
    after_tool_reply: "Attempted context_query with an invalid handle. Error handled gracefully."

  - match_type: contains
    pattern: "reduce context bad handle"
    tool_calls:
      - id: tc-ctx-reduce-bad
        tool: context
        args:
          action: reduce
          handle: ctx_bad_handle_test_xyz
          prompt: "Synthesise the results above."
    after_tool_reply: "Attempted context_reduce with an invalid handle. Error handled gracefully."

  # ── Default fallback ─────────────────────────────────────────────────────────

  - match_type: default
    reply: "Mock response: I understand your request and will proceed with the task."
