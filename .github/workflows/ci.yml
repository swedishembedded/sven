name: CI
run-name: "CI – ${{ github.ref_name }} (${{ github.event_name }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfontconfig-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: make check

      - name: Tests
        run: make test

  # End-to-end basic tests: CLI, CI mode, mock responses, pipeline.
  e2e-basic:
    name: E2E basic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install bats-core and Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats libfontconfig-dev

      - name: Run basic e2e tests
        run: make tests/e2e/basic

  # Quick smoke-test: make sure we can actually build a release binary.
  # This catches linker / feature-flag issues before a real release.
  build-smoke:
    name: Release build smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfontconfig-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: make release
