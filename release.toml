# cargo-release configuration
# Install: cargo install cargo-release   (Makefile does this automatically)
# Usage:   make release/patch   (or /minor  /major)
#
# What cargo-release does on --execute:
#   1. Runs pre-release-hook (full test suite)
#   2. Bumps version in Cargo.toml
#   3. git commit "chore: release vX.Y.Z"
#   4. git tag  vX.Y.Z  (annotated)
#   5. git push + git push --tags
#   → The pushed tag triggers .github/workflows/release.yml

# push is disabled here so cargo-release does not use libgit2/gix for the push.
# Those libraries have their own SSH stack that bypasses ssh-agent and prompt
# for the passphrase even when the key is already loaded.  The Makefile targets
# run "git push" explicitly after cargo-release completes, which uses the system
# git binary and correctly honours the running ssh-agent.
push         = false
publish      = false          # sven is a binary tool, not a crates.io library
sign-tag     = false
sign-commit  = false

# Required for {{version}} etc. to be expanded in pre-release-commit-message
# (see cargo-release docs: placeholders only applied "if not consolidated")
consolidate-commits = false

pre-release-commit-message = "chore: release v{{version}}"

tag-name    = "v{{version}}"
tag-message = "Release v{{version}}"

allow-branch = ["main"]

# Tests are run by the Makefile release targets (make release/minor etc.)
# *before* invoking cargo-release so that a test failure never leaves
# Cargo.toml with a bumped but uncommitted version.
# pre-release-hook is intentionally omitted here.
