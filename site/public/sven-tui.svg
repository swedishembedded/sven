<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="500" fill="#0f1117"/>
<!-- Top status bar -->
<rect x="0" y="0" width="800" height="22" fill="#0b0e1a"/>
<rect x="0" y="22" width="800" height="1" fill="#1e1e2e"/>
<circle cx="10" cy="11" r="5" fill="#e6b428"/>
<text x="20" y="15" font-family="monospace" font-size="11" fill="#5b8dee" font-weight="bold">sven</text>
<text x="50" y="15" font-family="monospace" font-size="11" fill="#333345">|</text>
<text x="58" y="15" font-family="monospace" font-size="11" fill="#e8a030">anthropic/claude-sonnet-4-5</text>
<text x="240" y="15" font-family="monospace" font-size="11" fill="#333345">|</text>
<text x="248" y="15" font-family="monospace" font-size="11" fill="#4ade80">agent</text>
<text x="285" y="15" font-family="monospace" font-size="11" fill="#333345">| ctx [</text>
<text x="331" y="15" font-family="monospace" font-size="11" fill="#5b8dee">===</text>
<text x="349" y="15" font-family="monospace" font-size="11" fill="#333345">--------------------------------------------------------------</text>
<text x="620" y="15" font-family="monospace" font-size="11" fill="#2a2a3a">F4:mode  ^B:sessions  F1:help</text>

<!-- Tab bar -->
<rect x="0" y="23" width="800" height="20" fill="#0d0d18"/>
<rect x="0" y="43" width="800" height="1" fill="#1e1e2e"/>
<text x="12" y="37" font-family="monospace" font-size="10" fill="#5b8dee">Chat</text>
<text x="38" y="37" font-family="monospace" font-size="10" fill="#333345"> [12 msgs]</text>
<text x="620" y="37" font-family="monospace" font-size="10" fill="#4ade80">● ready</text>

<!-- Main content area -->
<rect x="0" y="44" width="800" height="396" fill="#0f1117"/>

<!-- Vertical divider: main chat on LEFT, session list on RIGHT -->
<line x1="614" y1="44" x2="614" y2="440" stroke="#1e1e2e" stroke-width="1"/>

<!-- ── Left pane: conversation ── -->
<text x="12" y="62" font-family="monospace" font-size="10" fill="#22d3ee">You:</text>
<text x="56" y="62" font-family="monospace" font-size="10" fill="#d4d8e4">Refactor the JWT auth to RS256 and add rate limiting</text>
<text x="56" y="77" font-family="monospace" font-size="10" fill="#d4d8e4">on the /auth/refresh endpoint.</text>

<text x="12" y="97" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="97" font-family="monospace" font-size="10" fill="#9aa5b8">On it. Reading the current auth implementation.</text>

<text x="12" y="115" font-family="monospace" font-size="10" fill="#5a6878">thinking</text>
<text x="64" y="115" font-family="monospace" font-size="10" fill="#e6b428">◆</text>
<text x="78" y="115" font-family="monospace" font-size="10" fill="#3a4455">"HS256 in use — needs keypair for RS256 rotation..."</text>

<text x="12" y="133" font-family="monospace" font-size="10" fill="#e8a030">⚙ read_file</text>
<text x="94" y="133" font-family="monospace" font-size="10" fill="#7a8898"> src/auth/jwt.rs</text>
<text x="490" y="133" font-family="monospace" font-size="10" fill="#4ade80">✓</text>
<text x="502" y="133" font-family="monospace" font-size="10" fill="#333345">0.1s ▶</text>

<text x="12" y="150" font-family="monospace" font-size="10" fill="#e8a030">⚙ read_file</text>
<text x="94" y="150" font-family="monospace" font-size="10" fill="#7a8898"> src/auth/middleware.rs</text>
<text x="490" y="150" font-family="monospace" font-size="10" fill="#4ade80">✓</text>
<text x="502" y="150" font-family="monospace" font-size="10" fill="#333345">0.1s ▶</text>

<text x="12" y="167" font-family="monospace" font-size="10" fill="#e8a030">⚙ edit_file</text>
<text x="94" y="167" font-family="monospace" font-size="10" fill="#7a8898"> src/auth/jwt.rs  (+61 -34)</text>
<text x="490" y="167" font-family="monospace" font-size="10" fill="#4ade80">✓</text>
<text x="502" y="167" font-family="monospace" font-size="10" fill="#333345">0.4s ▶</text>

<text x="12" y="184" font-family="monospace" font-size="10" fill="#e8a030">⚙ write_file</text>
<text x="94" y="184" font-family="monospace" font-size="10" fill="#7a8898"> src/auth/rate_limit.rs</text>
<text x="490" y="184" font-family="monospace" font-size="10" fill="#4ade80">✓</text>
<text x="502" y="184" font-family="monospace" font-size="10" fill="#333345">0.3s ▶</text>

<text x="12" y="201" font-family="monospace" font-size="10" fill="#e8a030">⚙ run_terminal_command</text>
<text x="196" y="201" font-family="monospace" font-size="10" fill="#7a8898"> cargo test -p auth</text>
<text x="490" y="201" font-family="monospace" font-size="10" fill="#4ade80">✓</text>
<text x="502" y="201" font-family="monospace" font-size="10" fill="#333345">3.8s ▶</text>

<text x="12" y="221" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="221" font-family="monospace" font-size="10" fill="#9aa5b8">Done. Changes:</text>
<text x="12" y="237" font-family="monospace" font-size="10" fill="#9aa5b8">  jwt.rs      RS256 with keypair rotation</text>
<text x="12" y="253" font-family="monospace" font-size="10" fill="#9aa5b8">  rate_limit  10 req/min sliding window</text>
<text x="12" y="269" font-family="monospace" font-size="10" fill="#9aa5b8">  tests       18 passing · coverage 94%</text>

<text x="12" y="291" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="291" font-family="monospace" font-size="10" fill="#9aa5b8">Commit and push? I'll write the message. [y/n]</text>
<rect x="340" y="281" width="7" height="13" fill="#5b8dee" opacity="0.85">
  <animate attributeName="opacity" values="0.85;0.2;0.85" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- ── Right pane: session list ── -->
<rect x="615" y="44" width="185" height="396" fill="#0a0a14"/>
<text x="624" y="62" font-family="monospace" font-size="9" fill="#333345">SESSIONS</text>

<rect x="615" y="67" width="185" height="18" fill="#14142a"/>
<text x="624" y="80" font-family="monospace" font-size="9" fill="#8ab4f8">▶ auth-refactor</text>

<text x="624" y="97" font-family="monospace" font-size="9" fill="#333345">  api-cleanup</text>
<text x="624" y="112" font-family="monospace" font-size="9" fill="#333345">  firmware-debug</text>
<text x="624" y="127" font-family="monospace" font-size="9" fill="#333345">  ci-pipeline</text>

<text x="624" y="148" font-family="monospace" font-size="9" fill="#222230">────────────────</text>
<text x="624" y="165" font-family="monospace" font-size="9" fill="#333345">MODE</text>
<text x="624" y="181" font-family="monospace" font-size="9" fill="#333345">  research  read</text>
<text x="624" y="196" font-family="monospace" font-size="9" fill="#333345">  plan      +write</text>
<text x="624" y="211" font-family="monospace" font-size="9" fill="#4ade80">● agent     full</text>

<text x="624" y="232" font-family="monospace" font-size="9" fill="#222230">────────────────</text>
<text x="624" y="249" font-family="monospace" font-size="9" fill="#333345">SKILLS</text>
<text x="624" y="265" font-family="monospace" font-size="9" fill="#5a9878">✓ rust</text>
<text x="624" y="280" font-family="monospace" font-size="9" fill="#5a9878">✓ commit</text>
<text x="624" y="295" font-family="monospace" font-size="9" fill="#5a9878">✓ security</text>

<text x="624" y="316" font-family="monospace" font-size="9" fill="#222230">────────────────</text>
<text x="624" y="333" font-family="monospace" font-size="9" fill="#333345">KEYS</text>
<text x="624" y="349" font-family="monospace" font-size="9" fill="#333345">j/k  scroll</text>
<text x="624" y="364" font-family="monospace" font-size="9" fill="#333345">/    search</text>
<text x="624" y="379" font-family="monospace" font-size="9" fill="#333345">F4   mode</text>
<text x="624" y="394" font-family="monospace" font-size="9" fill="#333345">^B   sessions</text>
<text x="624" y="409" font-family="monospace" font-size="9" fill="#333345">r    resume</text>

<!-- Bottom input bar -->
<rect x="0" y="440" width="800" height="1" fill="#1e1e2e"/>
<rect x="0" y="441" width="800" height="34" fill="#0a0a14"/>
<text x="8" y="453" font-family="monospace" font-size="10" fill="#5b8dee">Input</text>
<line x1="44" y1="452" x2="610" y2="452" stroke="#1e1e2e" stroke-width="1"/>
<text x="8" y="468" font-family="monospace" font-size="10" fill="#22d3ee"> &gt; </text>
<text x="32" y="468" font-family="monospace" font-size="10" fill="#333345">ask anything... (Enter to send, / for commands)</text>
<rect x="0" y="475" width="800" height="1" fill="#1e1e2e"/>
<rect x="0" y="476" width="800" height="24" fill="#0a0a14"/>
<text x="307" y="491" text-anchor="middle" font-family="monospace" font-size="9" fill="#2a2a3a">Enter:send  j/k:scroll  F4:mode  /:search  r:resume</text>
</svg>
