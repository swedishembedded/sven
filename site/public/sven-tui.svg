<text x="463" y="316" font-family="monospace" font-size="10" fill="#445566"> for key bindings</text>
<text x="410" y="340" font-family="monospace" font-size="10" fill="#445566">Modes:</text>
<text x="410" y="357" font-family="monospace" font-size="10" fill="#445566">  research</text>
<text x="475" y="357" font-family="monospace" font-size="10" fill="#5a7060">  read-only, no tool access</text>
<text x="410" y="372" font-family="monospace" font-size="10" fill="#445566">  plan</text>
<text x="445" y="372" font-family="monospace" font-size="10" fill="#5a7060">      read + write files only</text>
<text x="410" y="387" font-family="monospace" font-size="10" fill="#4ade80">  agent</text>
<text x="454" y="387" font-family="monospace" font-size="10" fill="#5a7060">     full tool access</text>
