<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="500" fill="#0f1117"/>
<!-- Top status bar — blue accent for P2P/network theme -->
<rect x="0" y="0" width="800" height="22" fill="#08080f"/>
<rect x="0" y="22" width="800" height="1" fill="#14143a"/>
<circle cx="10" cy="11" r="5" fill="#5b8dee"/>
<text x="20" y="15" font-family="monospace" font-size="11" fill="#5b8dee" font-weight="bold">sven</text>
<text x="50" y="15" font-family="monospace" font-size="11" fill="#252540">|</text>
<text x="58" y="15" font-family="monospace" font-size="11" fill="#e8a030">openrouter/anthropic/claude-sonnet-4-5</text>
<text x="312" y="15" font-family="monospace" font-size="11" fill="#252540">|</text>
<text x="320" y="15" font-family="monospace" font-size="11" fill="#4ade80">agent</text>
<text x="357" y="15" font-family="monospace" font-size="11" fill="#252540">| ctx [</text>
<text x="403" y="15" font-family="monospace" font-size="11" fill="#5b8dee">==</text>
<text x="415" y="15" font-family="monospace" font-size="11" fill="#252540">--------------------------------------------------------------------------</text>
<text x="620" y="15" font-family="monospace" font-size="11" fill="#1a1a30">node:active  4 peers</text>

<!-- Tab bar -->
<rect x="0" y="23" width="800" height="20" fill="#0a0a14"/>
<rect x="0" y="43" width="800" height="1" fill="#14143a"/>
<text x="12" y="37" font-family="monospace" font-size="10" fill="#5b8dee">Chat</text>
<text x="38" y="37" font-family="monospace" font-size="10" fill="#252540"> [9 msgs]  ·  p2p node running · mDNS active</text>

<!-- Content -->
<rect x="0" y="44" width="800" height="396" fill="#0f1117"/>

<text x="12" y="62" font-family="monospace" font-size="10" fill="#22d3ee">You:</text>
<text x="56" y="62" font-family="monospace" font-size="10" fill="#d4d8e4">Start the node, list what peers are on the network, delegate a</text>
<text x="56" y="77" font-family="monospace" font-size="10" fill="#d4d8e4">security review of src/auth/jwt.rs to the backend agent.</text>

<text x="12" y="97" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="97" font-family="monospace" font-size="10" fill="#9aa5b8">Starting the node and scanning for peers via mDNS.</text>

<text x="12" y="115" font-family="monospace" font-size="10" fill="#5a6878">thinking</text>
<text x="64" y="115" font-family="monospace" font-size="10" fill="#5b8dee">◆</text>
<text x="78" y="115" font-family="monospace" font-size="10" fill="#252540">"Start node, wait for peer discovery, then delegate..."</text>

<text x="12" y="133" font-family="monospace" font-size="10" fill="#e8a030">⚙ node_start</text>
<text x="108" y="133" font-family="monospace" font-size="10" fill="#3a3060">                                → ✓</text>
<text x="408" y="133" font-family="monospace" font-size="10" fill="#3a6080">"node started · mDNS advertising on LAN"</text>
<text x="720" y="133" font-family="monospace" font-size="10" fill="#252540">0.8s</text>

<text x="12" y="151" font-family="monospace" font-size="10" fill="#e8a030">⚙ list_peers</text>
<text x="108" y="151" font-family="monospace" font-size="10" fill="#3a3060">                                → ✓</text>
<text x="408" y="151" font-family="monospace" font-size="10" fill="#3a6080">"4 peers discovered"</text>
<text x="720" y="151" font-family="monospace" font-size="10" fill="#252540">0.2s</text>

<text x="12" y="169" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="169" font-family="monospace" font-size="10" fill="#9aa5b8">4 peers found on the network:</text>
<text x="12" y="185" font-family="monospace" font-size="10" fill="#9aa5b8">  backend   192.168.1.42   claude-sonnet   ● online</text>
<text x="12" y="200" font-family="monospace" font-size="10" fill="#9aa5b8">  frontend  192.168.1.55   gpt-4o          ● online</text>
<text x="12" y="215" font-family="monospace" font-size="10" fill="#9aa5b8">  embedded  192.168.1.71   claude-haiku    ● online</text>
<text x="12" y="230" font-family="monospace" font-size="10" fill="#9aa5b8">  relay     relay.sven.io  —               ● bridge</text>

<text x="12" y="250" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="250" font-family="monospace" font-size="10" fill="#9aa5b8">Delegating the security review to backend agent:</text>

<text x="12" y="268" font-family="monospace" font-size="10" fill="#e8a030">⚙ delegate_task</text>
<text x="132" y="268" font-family="monospace" font-size="10" fill="#5a5080"> peer=backend</text>
<text x="228" y="268" font-family="monospace" font-size="10" fill="#7a7098"> task="security review of src/auth/jwt.rs"</text>
<text x="594" y="268" font-family="monospace" font-size="10" fill="#3a3060">→ ✓</text>
<text x="624" y="268" font-family="monospace" font-size="10" fill="#3a6080">"accepted"</text>
<text x="720" y="268" font-family="monospace" font-size="10" fill="#252540">0.1s</text>

<text x="12" y="286" font-family="monospace" font-size="10" fill="#5a6878">thinking</text>
<text x="64" y="286" font-family="monospace" font-size="10" fill="#5b8dee">◆</text>
<text x="78" y="286" font-family="monospace" font-size="10" fill="#252540">"Waiting for backend agent to complete review..."</text>

<text x="12" y="304" font-family="monospace" font-size="10" fill="#e8a030">⚙ delegate_task</text>
<text x="132" y="304" font-family="monospace" font-size="10" fill="#5a5080"> await result  task_id=tk_01</text>
<text x="330" y="304" font-family="monospace" font-size="10" fill="#3a3060">                 → ✓</text>
<text x="546" y="304" font-family="monospace" font-size="10" fill="#3a6080">"result received"</text>
<text x="720" y="304" font-family="monospace" font-size="10" fill="#252540">3.4s</text>

<text x="12" y="322" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="322" font-family="monospace" font-size="10" fill="#9aa5b8">backend agent completed the review in 3.4s. Summary:</text>
<text x="12" y="340" font-family="monospace" font-size="10" fill="#9aa5b8">  Score: 8/10  ·  No hardcoded secrets  ·  JWT expiry enforced</text>
<text x="12" y="356" font-family="monospace" font-size="10" fill="#e8a030">  ⚠ Missing rate-limit on /auth/refresh (medium severity)</text>
<text x="12" y="372" font-family="monospace" font-size="10" fill="#9aa5b8">  Recommendation: sliding-window 10 req/min, 401 on exceeded</text>

<text x="12" y="392" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="392" font-family="monospace" font-size="10" fill="#9aa5b8">Delegate the fix to backend as well? [y/n]</text>

<!-- Input -->
<rect x="0" y="440" width="800" height="1" fill="#14143a"/>
<rect x="0" y="441" width="800" height="34" fill="#08080f"/>
<text x="8" y="453" font-family="monospace" font-size="10" fill="#5b8dee">Input</text>
<line x1="44" y1="452" x2="792" y2="452" stroke="#14143a" stroke-width="1"/>
<text x="8" y="468" font-family="monospace" font-size="10" fill="#22d3ee"> &gt; </text>
<text x="32" y="468" font-family="monospace" font-size="10" fill="#252540">ask anything... (Enter to send, / for commands)</text>
<rect x="0" y="475" width="800" height="1" fill="#14143a"/>
<rect x="0" y="476" width="800" height="24" fill="#08080f"/>
<text x="400" y="491" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a1a30">Enter:send  Alt+Enter:newline  ^w k:chat  4 peers connected</text>
</svg>
