<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#1e1e2e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Connection lines between nodes -->
  <!-- Central to backend -->
  <line x1="400" y1="230" x2="220" y2="140" stroke="#5b8dee" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Central to frontend -->
  <line x1="400" y1="230" x2="580" y2="140" stroke="#5b8dee" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Central to embedded -->
  <line x1="400" y1="230" x2="200" y2="360" stroke="#e6b428" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Central to relay -->
  <line x1="400" y1="230" x2="620" y2="370" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Cross connections -->
  <line x1="220" y1="140" x2="580" y2="140" stroke="#5b8dee" stroke-width="1" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Animated pulse on lines (static approximation) -->
  <circle cx="310" cy="185" r="3" fill="#5b8dee" opacity="0.8"/>
  <circle cx="490" cy="185" r="3" fill="#5b8dee" opacity="0.8"/>
  <circle cx="300" cy="295" r="3" fill="#e6b428" opacity="0.8"/>
  <circle cx="510" cy="300" r="3" fill="#4ade80" opacity="0.8"/>

  <!-- Central node: "sven node" (local) -->
  <circle cx="400" cy="230" r="40" fill="#12121a" stroke="#5b8dee" stroke-width="2" filter="url(#nodeGlow)"/>
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="11" fill="#5b8dee" font-weight="bold">sven.</text>
  <text x="400" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#888898">local</text>

  <!-- Backend agent node -->
  <circle cx="220" cy="130" r="32" fill="#12121a" stroke="#5b8dee" stroke-width="1.5" opacity="0.9"/>
  <text x="220" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d8">sven.</text>
  <text x="220" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">backend</text>

  <!-- Frontend agent node -->
  <circle cx="580" cy="130" r="32" fill="#12121a" stroke="#5b8dee" stroke-width="1.5" opacity="0.9"/>
  <text x="580" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d8">sven.</text>
  <text x="580" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">frontend</text>

  <!-- Embedded agent node -->
  <circle cx="190" cy="365" r="32" fill="#12121a" stroke="#e6b428" stroke-width="1.5" opacity="0.9"/>
  <text x="190" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#e6b428">sven.</text>
  <text x="190" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">embedded</text>

  <!-- Relay/remote node -->
  <circle cx="630" cy="370" r="32" fill="#12121a" stroke="#4ade80" stroke-width="1.5" opacity="0.9"/>
  <text x="630" y="365" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">sven.</text>
  <text x="630" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">relay</text>

  <!-- Labels -->
  <text x="400" y="440" text-anchor="middle" font-family="monospace" font-size="10" fill="#555568">mDNS discovery on LAN · internet relay · mTLS encrypted</text>

  <!-- Status pills -->
  <rect x="20" y="20" width="120" height="20" rx="10" fill="#5b8dee18" stroke="#5b8dee30"/>
  <circle cx="34" cy="30" r="3" fill="#4ade80" opacity="0.9"/>
  <text x="45" y="34" font-family="monospace" font-size="9" fill="#5b8dee">4 peers online</text>

  <rect x="150" y="20" width="150" height="20" rx="10" fill="#4ade8018" stroke="#4ade8030"/>
  <circle cx="164" cy="30" r="3" fill="#4ade80" opacity="0.9"/>
  <text x="175" y="34" font-family="monospace" font-size="9" fill="#4ade80">relay connected</text>

  <rect x="310" y="20" width="160" height="20" rx="10" fill="#e6b42818" stroke="#e6b42830"/>
  <text x="390" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#e6b428">mTLS · WebAuthn</text>
</svg>
