<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="500" fill="#0f1117"/>
<!-- Top status bar — amber accent for GDB/hardware theme -->
<rect x="0" y="0" width="800" height="22" fill="#0e0c08"/>
<rect x="0" y="22" width="800" height="1" fill="#2a2010"/>
<circle cx="10" cy="11" r="5" fill="#e6b428"/>
<text x="20" y="15" font-family="monospace" font-size="11" fill="#e6b428" font-weight="bold">sven</text>
<text x="50" y="15" font-family="monospace" font-size="11" fill="#3a3020">|</text>
<text x="58" y="15" font-family="monospace" font-size="11" fill="#e8a030">anthropic/claude-haiku-4-5</text>
<text x="233" y="15" font-family="monospace" font-size="11" fill="#3a3020">|</text>
<text x="241" y="15" font-family="monospace" font-size="11" fill="#4ade80">agent</text>
<text x="278" y="15" font-family="monospace" font-size="11" fill="#3a3020">| ctx [</text>
<text x="324" y="15" font-family="monospace" font-size="11" fill="#e6b428">=====</text>
<text x="354" y="15" font-family="monospace" font-size="11" fill="#3a3020">---------------------------------------------------------------------------</text>
<text x="620" y="15" font-family="monospace" font-size="11" fill="#2a2010">F1:help  F4:mode  ^c:quit</text>

<!-- Tab bar -->
<rect x="0" y="23" width="800" height="20" fill="#0d0b08"/>
<rect x="0" y="43" width="800" height="1" fill="#2a2010"/>
<text x="12" y="37" font-family="monospace" font-size="10" fill="#e6b428">Chat</text>
<text x="38" y="37" font-family="monospace" font-size="10" fill="#3a3020"> [18 msgs]  ·  nrf52840 target</text>

<!-- Content -->
<rect x="0" y="44" width="800" height="396" fill="#0f1117"/>

<text x="12" y="62" font-family="monospace" font-size="10" fill="#22d3ee">You:</text>
<text x="56" y="62" font-family="monospace" font-size="10" fill="#d4d8e4">Connect to the nRF52840, set a breakpoint on uart_nrfx_fifo_fill,</text>
<text x="56" y="77" font-family="monospace" font-size="10" fill="#d4d8e4">run to it, and inspect the parameters. Use zephyr.elf.</text>

<text x="12" y="97" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="97" font-family="monospace" font-size="10" fill="#9aa5b8">I'll start with a GDB status check, then bring up the server.</text>

<text x="12" y="115" font-family="monospace" font-size="10" fill="#5a6878">thinking</text>
<text x="64" y="115" font-family="monospace" font-size="10" fill="#e6b428">◆</text>
<text x="78" y="115" font-family="monospace" font-size="10" fill="#3a4030">"Check if OpenOCD is already running before starting a new server..."</text>

<text x="12" y="133" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_status</text>
<text x="108" y="133" font-family="monospace" font-size="10" fill="#3a4030">                        → ✓</text>
<text x="300" y="133" font-family="monospace" font-size="10" fill="#5a8060">"server: not running"</text>
<text x="720" y="133" font-family="monospace" font-size="10" fill="#3a3020">0.0s</text>

<text x="12" y="151" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="151" font-family="monospace" font-size="10" fill="#9aa5b8">Not running. Starting OpenOCD with your JLink config:</text>

<text x="12" y="169" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_start_server</text>
<text x="150" y="169" font-family="monospace" font-size="10" fill="#7a7050"> openocd -f interface/jlink.cfg -f target/nrf52.cfg</text>
<text x="624" y="169" font-family="monospace" font-size="10" fill="#3a4030">→ ✓</text>
<text x="660" y="169" font-family="monospace" font-size="10" fill="#5a8060">"started :2331"</text>
<text x="720" y="169" font-family="monospace" font-size="10" fill="#3a3020">1.2s</text>

<text x="12" y="187" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_connect</text>
<text x="114" y="187" font-family="monospace" font-size="10" fill="#7a7050"> executable=zephyr.elf  port=2331</text>
<text x="432" y="187" font-family="monospace" font-size="10" fill="#3a4030">→ ✓</text>
<text x="468" y="187" font-family="monospace" font-size="10" fill="#5a8060">"connected to localhost:2331"</text>
<text x="720" y="187" font-family="monospace" font-size="10" fill="#3a3020">0.3s</text>

<text x="12" y="205" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="205" font-family="monospace" font-size="10" fill="#7a7050"> monitor reset halt</text>
<text x="264" y="205" font-family="monospace" font-size="10" fill="#3a4030">                    → ✓</text>
<text x="468" y="205" font-family="monospace" font-size="10" fill="#5a8060">"target halted at 0x00000000"</text>
<text x="720" y="205" font-family="monospace" font-size="10" fill="#3a3020">0.4s</text>

<text x="12" y="223" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="223" font-family="monospace" font-size="10" fill="#7a7050"> break uart_nrfx_fifo_fill</text>
<text x="288" y="223" font-family="monospace" font-size="10" fill="#3a4030">                → ✓</text>
<text x="468" y="223" font-family="monospace" font-size="10" fill="#5a8060">"Breakpoint 1: 0x0002a4fc"</text>
<text x="720" y="223" font-family="monospace" font-size="10" fill="#3a3020">0.1s</text>

<text x="12" y="241" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="241" font-family="monospace" font-size="10" fill="#7a7050"> continue</text>
<text x="180" y="241" font-family="monospace" font-size="10" fill="#3a4030">                              → ✓</text>
<text x="468" y="241" font-family="monospace" font-size="10" fill="#e6b428">"Breakpoint 1 hit  uart_nrfx_fifo_fill"</text>
<text x="720" y="241" font-family="monospace" font-size="10" fill="#3a3020">2.1s</text>

<text x="12" y="259" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="259" font-family="monospace" font-size="10" fill="#9aa5b8">Breakpoint hit. Inspecting parameters:</text>

<text x="12" y="277" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="277" font-family="monospace" font-size="10" fill="#7a7050"> print /x dev</text>
<text x="192" y="277" font-family="monospace" font-size="10" fill="#3a4030">                          → ✓</text>
<text x="468" y="277" font-family="monospace" font-size="10" fill="#5a8060">"$1 = (struct device *) 0x5e27c"</text>
<text x="720" y="277" font-family="monospace" font-size="10" fill="#3a3020">0.1s</text>

<text x="12" y="295" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="295" font-family="monospace" font-size="10" fill="#7a7050"> print /x tx_data</text>
<text x="210" y="295" font-family="monospace" font-size="10" fill="#3a4030">                      → ✓</text>
<text x="468" y="295" font-family="monospace" font-size="10" fill="#5a8060">"$2 = (uint8_t *) 0x20000c03"</text>
<text x="720" y="295" font-family="monospace" font-size="10" fill="#3a3020">0.1s</text>

<text x="12" y="313" font-family="monospace" font-size="10" fill="#e8a030">⚙ gdb_command</text>
<text x="120" y="313" font-family="monospace" font-size="10" fill="#7a7050"> print len</text>
<text x="174" y="313" font-family="monospace" font-size="10" fill="#3a4030">                             → ✓</text>
<text x="468" y="313" font-family="monospace" font-size="10" fill="#5a8060">"$3 = 21"</text>
<text x="720" y="313" font-family="monospace" font-size="10" fill="#3a3020">0.1s</text>

<text x="12" y="333" font-family="monospace" font-size="10" fill="#a0f0c8">Agent:</text>
<text x="62" y="333" font-family="monospace" font-size="10" fill="#9aa5b8">Here's what I found at the breakpoint:</text>
<text x="12" y="351" font-family="monospace" font-size="10" fill="#9aa5b8">  dev      (struct device *)  0x5e27c       — UART_0 device struct</text>
<text x="12" y="367" font-family="monospace" font-size="10" fill="#9aa5b8">  tx_data  (uint8_t *)        0x20000c03    — 21-byte buffer</text>
<text x="12" y="383" font-family="monospace" font-size="10" fill="#9aa5b8">  len                         21</text>
<text x="12" y="401" font-family="monospace" font-size="10" fill="#607060">  buffer contents: "AT+CREG?\r\n" — Quectel EG25-G modem command</text>

<!-- Input -->
<rect x="0" y="440" width="800" height="1" fill="#2a2010"/>
<rect x="0" y="441" width="800" height="34" fill="#0a0905"/>
<text x="8" y="453" font-family="monospace" font-size="10" fill="#e6b428">Input</text>
<line x1="44" y1="452" x2="792" y2="452" stroke="#2a2010" stroke-width="1"/>
<text x="8" y="468" font-family="monospace" font-size="10" fill="#22d3ee"> &gt; </text>
<text x="32" y="468" font-family="monospace" font-size="10" fill="#3a3020">ask anything... (Enter to send, / for commands)</text>
<rect x="0" y="475" width="800" height="1" fill="#2a2010"/>
<rect x="0" y="476" width="800" height="24" fill="#0a0905"/>
<text x="400" y="491" text-anchor="middle" font-family="monospace" font-size="9" fill="#2a2010">Enter:send  Shift+Enter:newline  ^w k:chat  gdb:connected</text>
</svg>
