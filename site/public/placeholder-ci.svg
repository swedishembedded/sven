  <text x="14" y="78" font-family="monospace" font-size="9.5" fill="#888">---</text>
  <text x="14" y="91" font-family="monospace" font-size="9.5" fill="#e6b428">model</text><text x="66" y="91" font-family="monospace" font-size="9.5" fill="#888">: claude-3-5-sonnet</text>
  <text x="14" y="104" font-family="monospace" font-size="9.5" fill="#e6b428">mode</text><text x="60" y="104" font-family="monospace" font-size="9.5" fill="#888">: research</text>
  <text x="14" y="117" font-family="monospace" font-size="9.5" fill="#888">---</text>

  <text x="14" y="138" font-family="monospace" font-size="9.5" fill="#5b8dee">## Step 1: Understand the change</text>
  <text x="14" y="154" font-family="monospace" font-size="9.5" fill="#c8c8d8">Read the diff for PR #{{pr_number}} and</text>
  <text x="14" y="167" font-family="monospace" font-size="9.5" fill="#c8c8d8">summarize what changed.</text>

  <text x="14" y="190" font-family="monospace" font-size="9.5" fill="#5b8dee">## Step 2: Security check</text>
  <text x="14" y="206" font-family="monospace" font-size="9.5" fill="#c8c8d8">Look for unsafe patterns, SQL injection,</text>
  <text x="14" y="219" font-family="monospace" font-size="9.5" fill="#c8c8d8">hardcoded secrets, or missing validation.</text>

  <text x="14" y="242" font-family="monospace" font-size="9.5" fill="#5b8dee">## Step 3: Test coverage</text>
  <text x="14" y="258" font-family="monospace" font-size="9.5" fill="#c8c8d8">Check if tests cover the changed code.</text>
  <text x="14" y="271" font-family="monospace" font-size="9.5" fill="#c8c8d8">Report any gaps.</text>

  <text x="14" y="294" font-family="monospace" font-size="9.5" fill="#5b8dee">## Step 4: Output</text>
  <text x="14" y="310" font-family="monospace" font-size="9.5" fill="#c8c8d8">Write a structured review to</text>
  <text x="14" y="323" font-family="monospace" font-size="9.5" fill="#c8c8d8">review-output.md with scores 1-10.</text>

  <!-- Right: CI output -->
  <text x="378" y="65" font-family="monospace" font-size="9.5" fill="#555568">¶  sven --file review.md --var pr_number=142</text>

  <text x="378" y="89" font-family="monospace" font-size="9.5" fill="#c8a03c">Step 1/4  Understand the change</text>
  <text x="378" y="103" font-family="monospace" font-size="9.5" fill="#c8a03c">  ™  run_terminal_command  git diff origin/main HEAD</text>
