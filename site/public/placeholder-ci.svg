  <text x="378" y="183" font-family="monospace" font-size="9.5" fill="#f59e0b">     Missing input validation on user_id</text>

  <text x="378" y="207" font-family="monospace" font-size="9.5" fill="#c8a03c">Step 3/4  Test coverage</text>
  <text x="378" y="221" font-family="monospace" font-size="9.5" fill="#c8a03c">  ™  run_terminal_command  cargo tarpaulin</text>
  <text x="378" y="235" font-family="monospace" font-size="9.5" fill="#f59e0b">     auth/login.rs: 67% coverage (target 80%)</text>

  <text x="378" y="259" font-family="monospace" font-size="9.5" fill="#c8a03c">Step 4/4  Output</text>
  <text x="378" y="273" font-family="monospace" font-size="9.5" fill="#c8a03c">  ™  write_file  review-output.md</text>
  <text x="378" y="287" font-family="monospace" font-size="9.5" fill="#4ade80">    Review written</text>

  <rect x="378" y="305" width="400" height="1" fill="#1e1e2e"/>

