# Cross.toml — configuration for `cross` (Docker-based cross-compilation).
#
# The aarch64 image does not ship OpenSSL headers for the target architecture
# by default.  The pre-build hook adds the arm64 multiarch package so that
# openssl-sys (pulled in by git2 and webauthn-rs) can locate them via
# pkg-config.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y --no-install-recommends libssl-dev:arm64",
]
