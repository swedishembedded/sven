# .pre-commit-config.yaml
# Run `pre-commit autoupdate` periodically to keep hook versions current.
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
# Stop on first failure so we don't run slow hooks (e.g. clippy) after fmt fails.
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: true

      # Clippy runs only on packages that contain the passed (staged) files.
      # On commit: only changed packages are checked. Use "pre-commit run --all-files"
      # to check the full workspace.
      - id: cargo-clippy
        name: cargo clippy
        entry: bash scripts/clippy-staged.sh
        language: system
        types: [rust]
        pass_filenames: true
