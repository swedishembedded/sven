<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>sven node</title>
  <link rel="stylesheet" href="/web/assets/xterm.css">
  <link rel="stylesheet" href="/web/assets/style.css">
</head>
<body>

<!-- Auth screen (visible until session established) -->
<div id="auth-screen">
  <div class="auth-card" id="card">
    <div class="logo">sven<span>.</span></div>
    <div class="tagline">AI agent node terminal</div>
    <!-- state machine renders into #card-body -->
    <div id="card-body"></div>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<!-- Terminal screen (shown after successful auth) -->
<!-- display:flex is set by JS (startTerminal) — CSS default is none -->
<div id="terminal-screen">
  <div id="terminal"></div>
  <div id="status-bar">
    <div class="dot"></div>
    <span id="status-text">reconnecting…</span>
  </div>
</div>

<script src="/web/assets/xterm.min.js"></script>
<script src="/web/assets/addon-fit.min.js"></script>
<script src="/web/assets/addon-web-links.min.js"></script>
<script src="/web/assets/app.js"></script>
</body>
</html>
